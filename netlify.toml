# ============================================================
# Coach Princeton Basketball — Netlify Config
# ============================================================

[build]
  publish = "."
  # No build command needed — pure static HTML

[functions]
  directory = "netlify/functions"

# -----------------------------------------------
# Security & performance headers
# -----------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://googleads.g.doubleclick.net https://www.google.com https://jstest.authorize.net https://js.authorize.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.google-analytics.com https://www.googletagmanager.com https://googleads.g.doubleclick.net https://www.google.com https://pagead2.googlesyndication.com; connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com https://www.google.com https://googleads.g.doubleclick.net https://apitest.authorize.net https://api2.authorize.net; frame-src https://www.youtube.com https://youtube.com https://www.googletagmanager.com https://bid.g.doubleclick.net https://td.doubleclick.net;"

# PDF downloads
[[headers]]
  for = "/files/*.pdf"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Disposition = "attachment"

# Cache static assets aggressively
[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages — short cache so edits show up fast
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# -----------------------------------------------
# Redirects (supplement to _redirects file)
# -----------------------------------------------
# Force HTTPS
[[redirects]]
  from = "http://coachprincetonbasketball.com/*"
  to = "https://coachprincetonbasketball.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.coachprincetonbasketball.com/*"
  to = "https://coachprincetonbasketball.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.coachprincetonbasketball.com/*"
  to = "https://coachprincetonbasketball.com/:splat"
  status = 301
  force = true

# Legacy /terms path redirect
[[redirects]]
  from = "/terms"
  to = "/terms-of-use/"
  status = 301
  force = true

[[redirects]]
  from = "/terms/"
  to = "/terms-of-use/"
  status = 301
  force = true

[[redirects]]
  from = "/princeton-offense-sets/"
  to = "/princeton-offense-actions/"
  status = 301
  force = true

[[redirects]]
  from = "/princeton-offense-a-complete-guide/"
  to = "/princeton-offense-complete-guide/"
  status = 301
  force = true

[[redirects]]
  from = "/sitemap_index.xml"
  to = "/sitemap.xml"
  status = 301
