name: Agent-ready spec
description: Phase 1 issue template for the manual Codex -> Claude PR loop.
title: "[Agent] "
labels:
  - phase1:ready
body:
  - type: markdown
    attributes:
      value: |
        Use this template only for work that is ready for the Phase 1 agent loop.

        Do not add `agent:generate` until every required section is specific enough for another agent to verify without asking you to relay context.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-visible or developer-visible problem should this solve?
      placeholder: Describe the current behavior, why it is a problem, and who is affected.
    validations:
      required: true
  - type: textarea
    id: desired_outcome
    attributes:
      label: Desired outcome
      description: What should be true after this is done?
      placeholder: Describe the target behavior in concrete terms.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: List testable criteria. Use checkboxes so the verifier can map PR behavior back to the spec.
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true
  - type: textarea
    id: evidence_plan
    attributes:
      label: Evidence plan
      description: Tests are preferred. If a failing test is not practical, define the manual check or review rubric.
      value: |
        Expected evidence:
        - [ ] Failing test added before or with the implementation
        - [ ] Existing test updated
        - [ ] Manual verification rubric below

        Manual verification rubric, if needed:
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Name boundaries the generator must respect.
      placeholder: Performance, compatibility, package/dependency limits, API shape, design conventions, accessibility, security, data handling, or deployment constraints.
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: What tempting adjacent work should agents avoid?
      placeholder: Explicitly list non-goals and related problems that should not be solved in this PR.
    validations:
      required: true
  - type: textarea
    id: risk_notes
    attributes:
      label: Risk notes
      description: Identify sensitive surfaces. If any hard-stop surface is involved, do not start the loop without human approval.
      value: |
        Changed surfaces expected:
        - 

        Hard-stop check:
        - [ ] Secrets or credentials
        - [ ] Auth, permissions, or session handling
        - [ ] Billing or payments
        - [ ] Protected paths or production config
        - [ ] Database migrations or destructive data changes
        - [ ] Unclear code ownership
        - [ ] None of the above
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of done
      description: What must be true before this can be marked ready for human merge?
      value: |
        - [ ] Acceptance criteria are satisfied
        - [ ] Evidence plan is satisfied
        - [ ] CI is green, or failures are documented as unrelated
        - [ ] Verifier has approved
        - [ ] PR is labeled `needs-human`
    validations:
      required: true
